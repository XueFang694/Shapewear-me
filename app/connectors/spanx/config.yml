name: SPANX
slug: spanx
base_url: https://www.spanx.com
version: "1.0"

# Moteur : shopify_json = endpoint /products.json (API Shopify)
engine: shopify_json
rate_limit_rps: 0.5
delay_min: 2.5
delay_max: 6.0

pagination:
  type: offset
  param: page
  page_size: 250
  max_pages: 100

categories_url: /collections
product_list_endpoint: /products.json

# Catégories shapewear à cibler (slugs Shopify)
target_collections:
  - bodysuits
  - shorts
  - leggings
  - bras
  - panties
  - tanks
  - swim

# Sélecteurs CSS (mode html uniquement — non utilisés en mode shopify_json)
selectors:
  product_name: h1.product__title
  price: span.price__current
  original_price: span.price__compare
  description: div.product__description
  images: div.product__media img[src]
  sizes: select.variant-selector[data-option="Size"] option
  colors: div.color-swatch[data-color]

headers:
  Accept-Language: en-US,en;q=0.9
  Accept: text/html,application/json
  User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36
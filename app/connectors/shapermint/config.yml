name: Shapermint
slug: shapermint
base_url: https://shapermint.com
version: "5.0"

# Shapermint est un frontend Next.js SSR headless (Trafilea).
# Les endpoints Shopify publics sont TOUS bloqués (404) :
#   /products.json, /collections/<slug>/products.json
#
# Stratégie v5.0 :
#   1. GET /collections/<slug>?page=N  → HTML avec __NEXT_DATA__ JSON embarqué
#      → pageProps.products  (slugs + données résumées pour identifier les produits)
#      → pageProps.pagination.total_pages
#   2. GET /products/<slug>            → HTML page produit avec __NEXT_DATA__ complet
#      → variations_definition.product_variations[] : variantes + stock + prix
#      → product.material / product.composition     : matériaux
#      → product.compression                        : niveau de compression
#      → ssrReviews                                 : premier lot d'avis + pagination
#   3. GET https://api.shapermint.com/reviews?product_uuid=<uuid>&page=N&without_images=true
#      → reviews texte supplémentaires (max_review_pages pages)
#
# engine: html — ScrapingEngine passe response.text (HTML) à parse_product().
# NE PAS mettre shopify_json ici, sinon ScrapingEngine appellera response.json()
# sur du HTML et déclenchera un JSONDecodeError.
engine: html

rate_limit_rps: 0.3
delay_min: 2.5
delay_max: 6.0

pagination:
  page_size: 20    # Shapermint affiche 20 produits/page en SSR
  max_pages: 20    # 20 × 20 = 400 produits max par collection

# Nombre max de pages d'avis TEXTE (sans images) à fetcher via l'API
# pour chaque produit. Chaque page contient 20 avis.
# Mettre à 0 pour ne récupérer que les avis SSR (avec images, ~4 avis).
# Recommandé : 3 → environ 60 avis texte + 4 avis SSR par produit.
max_review_pages: 3

# Collections cibles (slugs vérifiés)
target_collections:
  - shapewear
  - bodysuits
  - shorts
  - leggings
  - bras
  - underwear
  - tanks-camis
  - waist-trainers

# Tags Shopify signalant un Best Seller chez Shapermint
best_seller_tags:
  - "product-label-best-seller"
  - "section-best-seller"
  - "winning-product"
  - "best seller"
  - "bestseller"
  - "top seller"
  - "popular"

headers:
  Accept-Language: en-US,en;q=0.9
  Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8
  User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36
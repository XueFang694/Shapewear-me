name: Shapermint
slug: shapermint
base_url: https://shapermint.com
version: "1.5"
engine: shopify_json

# Shapermint est un frontend Next.js SSR custom (Trafilea).
# Les endpoints Shopify publics sont TOUS bloqués (404) :
#   /products.json, /collections/<slug>/products.json
#
# Stratégie fonctionnelle :
#   1. GET /collections/<slug>?page=N  → HTML avec __NEXT_DATA__ JSON embarqué
#      → pageProps.products  (20 produits/page, prix, tags, images, couleurs)
#      → pageProps.pagination.total_pages
#   2. GET /products/<slug>.json       → variants complets (tailles, description)
#
# Les collections ci-dessous correspondent aux vrais slugs du site.
target_collections:
  - shapewear
  - bodysuits
  - shorts
  - leggings
  - bras
  - underwear
  - tanks-camis
  - waist-trainers

rate_limit_rps: 0.3
delay_min: 2.5
delay_max: 6.0

pagination:
  page_size: 20    # Shapermint fixe 20 produits/page côté SSR
  max_pages: 20    # Sécurité : 20 × 20 = 400 produits max par collection

# Tags Shopify signalant un Best Seller chez Shapermint
best_seller_tags:
  - "product-label-best-seller"
  - "section-best-seller"
  - "winning-product"
  - "best seller"
  - "bestseller"
  - "top seller"
  - "popular"

# Types de produits conservés (filtre sur product_type du .json individuel)
target_product_types:
  - Bodysuits
  - Bodysuit
  - Shorts
  - Shaper Shorts
  - Bras
  - Bra
  - Underwear
  - Panties
  - Leggings
  - Camis
  - Tanks
  - Shapewear
  - Waist Trainers
  - Body Shapers
  - Full Body Shapers
  - Slips

headers:
  Accept-Language: en-US,en;q=0.9
  Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8
  User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36
name: Shapermint
slug: shapermint
base_url: https://shapermint.com
version: "1.0"
engine: shopify_json
rate_limit_rps: 0.3
delay_min: 2.5
delay_max: 6.0

pagination:
  type: offset
  param: page
  page_size: 250
  max_pages: 100

product_list_endpoint: /products.json

target_collections:
  - shapewear
  - bodysuits
  - bras
  - briefs
  - thighs-slimmer
  - waist-trainers

best_seller_tags:
  - "best seller"
  - bestseller
  - "top seller"
  - popular

headers:
  Accept-Language: en-US,en;q=0.9
  Accept: text/html,application/json
  User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36
name: Honeylove
slug: honeylove
base_url: https://honeylove.com
version: "1.0"
engine: shopify_json
rate_limit_rps: 0.4
delay_min: 2.0
delay_max: 5.0

pagination:
  type: offset
  param: page
  page_size: 250
  max_pages: 100

product_list_endpoint: /products.json

target_collections:
  - bodysuits
  - shorts
  - bras
  - underwear
  - leggings
  - tops

best_seller_tags:
  - "best seller"
  - bestseller
  - "best-seller"
  - "top seller"
  - hero

headers:
  Accept-Language: en-US,en;q=0.9
  Accept: text/html,application/json
  User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36